<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; }
  
  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 24px 32px; border-bottom: 2px solid #0f3460; }
  .header h1 { font-size: 28px; color: #e94560; margin-bottom: 4px; }
  .header p { color: #8899aa; font-size: 14px; }
  
  .tabs { display: flex; gap: 0; background: #1a1a2e; border-bottom: 2px solid #0f3460; padding: 0 32px; }
  .tab { padding: 14px 24px; cursor: pointer; color: #8899aa; font-weight: 500; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab:hover { color: #e0e0e0; }
  .tab.active { color: #e94560; border-bottom-color: #e94560; }
  
  .content { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
  
  .card { background: #1a1a2e; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #0f3460; }
  .card h3 { color: #e94560; margin-bottom: 12px; font-size: 18px; }
  
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: #16213e; border-radius: 10px; padding: 16px; text-align: center; border: 1px solid #0f3460; }
  .stat-number { font-size: 32px; font-weight: 700; color: #e94560; }
  .stat-label { font-size: 13px; color: #8899aa; margin-top: 4px; }
  
  .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .filter-bar select, .filter-bar input { background: #16213e; color: #e0e0e0; border: 1px solid #0f3460; padding: 10px 14px; border-radius: 8px; font-size: 14px; }
  .filter-bar select:focus, .filter-bar input:focus { outline: none; border-color: #e94560; }
  
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-lower { background: #1b4332; color: #95d5b2; }
  .badge-push { background: #3d1f00; color: #ffb347; }
  .badge-pull { background: #1a1040; color: #b8a9ff; }
  .badge-core { background: #3d0000; color: #ff9999; }
  .badge-carry { background: #003d3d; color: #99ffff; }
  .badge-other { background: #333; color: #aaa; }
  .badge-editable { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .badge-editable:hover { opacity: 0.8; box-shadow: 0 0 0 2px #e9456066; }
  
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; color: #8899aa; font-size: 12px; text-transform: uppercase; border-bottom: 1px solid #0f3460; }
  td { padding: 10px 12px; border-bottom: 1px solid #0f346033; font-size: 14px; }
  tr:hover td { background: #16213e55; }
  
  .exercise-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .exercise-card { background: #16213e; border-radius: 10px; padding: 16px; border: 1px solid #0f3460; cursor: pointer; transition: all 0.2s; }
  .exercise-card:hover { border-color: #e94560; transform: translateY(-2px); }
  .exercise-card h4 { color: #e0e0e0; margin-bottom: 8px; font-size: 15px; }
  .exercise-card .meta { color: #8899aa; font-size: 13px; }
  .exercise-card .weight-info { color: #e94560; font-weight: 600; font-size: 16px; margin-top: 8px; }
  
  .chart-container { position: relative; height: 300px; margin-top: 16px; }
  
  .gym-mode { background: #0a0a14; }
  .gym-card { background: #1a1a2e; border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 2px solid #0f3460; }
  .gym-card h2 { color: #e94560; font-size: 24px; margin-bottom: 16px; }
  .gym-card .last-weight { font-size: 48px; font-weight: 800; color: #e94560; }
  .gym-card .last-detail { color: #8899aa; font-size: 14px; margin-top: 4px; }
  .gym-card .suggestion { background: #16213e; padding: 12px 16px; border-radius: 8px; margin-top: 16px; border-left: 3px solid #e94560; }
  .gym-card .suggestion strong { color: #e94560; }
  
  .session-timeline { position: relative; padding-left: 24px; }
  .session-dot { width: 12px; height: 12px; background: #e94560; border-radius: 50%; position: absolute; left: 0; margin-top: 4px; }
  .session-entry { padding-bottom: 16px; padding-left: 16px; border-left: 2px solid #0f3460; margin-left: 5px; }
  
  .hidden { display: none; }
  
  .progress-arrow { font-size: 14px; }
  .progress-up { color: #52c41a; }
  .progress-down { color: #ff4d4f; }
  .progress-same { color: #8899aa; }
  
  @media (max-width: 768px) {
    .content { padding: 12px; }
    .header { padding: 16px; padding-top: env(safe-area-inset-top, 16px); }
    .tabs { padding: 0 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab { padding: 12px 14px; white-space: nowrap; font-size: 13px; }
    .exercise-list { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-card { padding: 12px; }
    .stat-number { font-size: 24px; }
    .card { padding: 14px; border-radius: 10px; }
    .filter-bar select, .filter-bar input { width: 100%; font-size: 16px; padding: 12px 14px; }
    .filter-bar { flex-direction: column; gap: 8px; }
    table { font-size: 13px; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    th, td { padding: 8px 10px; white-space: nowrap; }

    /* Gym Mode mobile optimizations */
    .gym-card { padding: 20px 16px; border-radius: 14px; }
    .gym-card h2 { font-size: 20px; }
    .gym-card .last-weight { font-size: 56px; line-height: 1.1; }
    .gym-card .last-detail { font-size: 15px; }
    .gym-card .suggestion { font-size: 15px; padding: 14px; margin-top: 20px; }
    .gym-set-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #0f346033; font-size: 15px; }
    .gym-set-row span { min-width: 60px; }

    .chart-container { height: 220px; }
  }

  /* PWA install banner */
  .install-banner { display: none; background: #16213e; padding: 12px 16px; text-align: center; border-bottom: 1px solid #0f3460; }
  .install-banner.show { display: block; }
  .install-btn { background: #e94560; color: white; border: none; padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .install-btn:active { opacity: 0.8; }

  /* Bottom nav for mobile */
  @media (max-width: 768px) {
    .tabs { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: #1a1a2e; border-top: 2px solid #0f3460; border-bottom: none; padding-bottom: env(safe-area-inset-bottom, 0); justify-content: space-around; }
    .tab { flex: 1; text-align: center; padding: 10px 8px; font-size: 12px; border-bottom: none; border-top: 3px solid transparent; }
    .tab.active { border-top-color: #e94560; border-bottom-color: transparent; }
    body { padding-bottom: 70px; }
  }
</style>

<body>
<div id="installBanner" class="install-banner">
  <span>Install this app for quick gym access </span>
  <button class="install-btn" onclick="installApp()">Add to Home Screen</button>
</div>
<div class="header">
  <h1>Workout Tracker</h1>
  <p>27 sessions tracked from Nov 2025 to Mar 2026</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('dashboard')">Dashboard</div>
  <div class="tab" onclick="showTab('exercises')">Exercises</div>
  <div class="tab" onclick="showTab('sessions')">Sessions</div>
  <div class="tab" onclick="showTab('gym')">Gym Mode</div>
</div>

<div id="dashboard" class="content">
  <div class="stats-grid" id="statsGrid"></div>
  <div class="card">
    <h3>Weight Progression - Top Exercises</h3>
    <div class="filter-bar">
      <select id="dashChartExercise" onchange="updateDashChart()"></select>
    </div>
    <div class="chart-container"><canvas id="dashChart"></canvas></div>
  </div>
  <div class="card">
    <h3>Category Distribution</h3>
    <div class="chart-container" style="height:250px"><canvas id="catChart"></canvas></div>
  </div>
</div>

<div id="exercises" class="content hidden">
  <div class="filter-bar">
    <select id="catFilter" onchange="filterExercises()">
      <option value="all">All Categories</option>
      <option value="Lower Body">Lower Body</option>
      <option value="Upper Body - Push">Upper Body - Push</option>
      <option value="Upper Body - Pull">Upper Body - Pull</option>
      <option value="Core">Core</option>
      <option value="Full Body / Carry">Full Body / Carry</option>
    </select>
    <input type="text" id="searchEx" placeholder="Search exercises..." oninput="filterExercises()">
  </div>
  <div class="exercise-list" id="exerciseList"></div>
  <div id="exerciseDetail" class="card hidden" style="margin-top:20px">
    <h3 id="detailTitle"></h3>
    <div class="chart-container"><canvas id="detailChart"></canvas></div>
    <table id="detailTable" style="margin-top:16px"></table>
  </div>
</div>

<div id="sessions" class="content hidden">
  <div class="filter-bar">
    <select id="sessionFilter" onchange="filterSessions()">
      <option value="all">All Sessions</option>
    </select>
  </div>
  <div id="sessionsList"></div>
</div>

<div id="gym" class="content hidden gym-mode">
  <div class="filter-bar">
    <select id="gymExercise" onchange="updateGymMode()" style="font-size:16px;padding:12px 16px"></select>
  </div>
  <div id="gymContent"></div>
</div>

const sessions = DATA.sessions;
const exercises = {};

// Load saved category overrides from localStorage
let categoryOverrides = {};
try { categoryOverrides = JSON.parse(localStorage.getItem('categoryOverrides') || '{}'); } catch(e) {}

function saveCategoryOverrides() {
  try { localStorage.setItem('categoryOverrides', JSON.stringify(categoryOverrides)); } catch(e) {}
}

function getExerciseCategory(name, fallback) {
  return categoryOverrides[name] || fallback || 'Other';
}

function changeCategory(exerciseName, newCat) {
  categoryOverrides[exerciseName] = newCat;
  saveCategoryOverrides();
  // Update in-memory data
  if (exercises[exerciseName]) exercises[exerciseName].category = newCat;
  sessions.forEach(s => {
    [...s.main, ...s.finisher].forEach(e => {
      if (e.exercise === exerciseName) e.category = newCat;
    });
  });
}

// Build exercise index from sessions
sessions.forEach(s => {
  [...s.main, ...s.finisher].forEach(e => {
    const cat = getExerciseCategory(e.exercise, e.category);
    e.category = cat;
    if (!exercises[e.exercise]) exercises[e.exercise] = {category: cat, history: []};
    exercises[e.exercise].history.push({date: s.date, set: e.set, reps: e.reps, weight: e.weight, comment: e.comment || ''});
  });
});

const ALL_CATEGORIES = ['Lower Body', 'Upper Body - Push', 'Upper Body - Pull', 'Core', 'Full Body / Carry', 'Other'];

const catColors = {
  'Lower Body': {bg:'#1b4332',fg:'#95d5b2',cls:'badge-lower'},
  'Upper Body - Push': {bg:'#3d1f00',fg:'#ffb347',cls:'badge-push'},
  'Upper Body - Pull': {bg:'#1a1040',fg:'#b8a9ff',cls:'badge-pull'},
  'Core': {bg:'#3d0000',fg:'#ff9999',cls:'badge-core'},
  'Full Body / Carry': {bg:'#003d3d',fg:'#99ffff',cls:'badge-carry'},
  'Other': {bg:'#333',fg:'#aaa',cls:'badge-other'}
};

function getCatBadge(cat, exerciseName) {
  const c = catColors[cat] || catColors['Other'];
  if (!exerciseName) {
    // Non-editable badge (used in tables etc.)
    return '<span class="badge '+c.cls+'">'+cat+'</span>';
  }
  // Editable badge — clicking opens a dropdown
  const id = 'cat_' + exerciseName.replace(/[^a-zA-Z0-9]/g, '_');
  return '<span class="badge-editable '+c.cls+'" onclick="openCatEditor(event, \''+exerciseName.replace(/'/g, "\\'")+'\')" title="Click to change category">' + cat + ' <span style="opacity:0.6;font-size:9px">&#9998;</span></span>';
}

function openCatEditor(event, exerciseName) {
  event.stopPropagation();
  // Remove any existing editor
  const old = document.getElementById('catEditorPopup');
  if (old) old.remove();

  const currentCat = exercises[exerciseName]?.category || 'Other';
  const rect = event.target.getBoundingClientRect();

  const popup = document.createElement('div');
  popup.id = 'catEditorPopup';
  popup.style.cssText = 'position:fixed;z-index:999;background:#16213e;border:1px solid #0f3460;border-radius:10px;padding:8px;box-shadow:0 8px 24px rgba(0,0,0,0.5);left:'+(rect.left)+'px;top:'+(rect.bottom+4)+'px;min-width:180px;';

  ALL_CATEGORIES.forEach(cat => {
    const cc = catColors[cat] || catColors['Other'];
    const isActive = cat === currentCat;
    const opt = document.createElement('div');
    opt.style.cssText = 'padding:8px 12px;cursor:pointer;border-radius:6px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;' + (isActive ? 'background:#0f3460;' : '');
    opt.innerHTML = '<span class="badge '+cc.cls+'" style="pointer-events:none">'+cat+'</span>' + (isActive ? ' <span style="color:#e94560">&#10003;</span>' : '');
    opt.onmouseenter = () => opt.style.background = '#0f3460';
    opt.onmouseleave = () => { if (!isActive) opt.style.background = 'none'; };
    opt.onclick = (e) => {
      e.stopPropagation();
      changeCategory(exerciseName, cat);
      popup.remove();
      // Refresh current view
      filterExercises();
      if (document.getElementById('sessions').classList.contains('hidden') === false) filterSessions();
      if (document.getElementById('gym').classList.contains('hidden') === false) updateGymMode();
    };
    popup.appendChild(opt);
  });

  document.body.appendChild(popup);

  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', function closer() {
      const p = document.getElementById('catEditorPopup');
      if (p) p.remove();
      document.removeEventListener('click', closer);
    }, {once: true});
  }, 10);
}

function getMaxWeight(exName) {
  const hist = exercises[exName]?.history || [];
  return Math.max(0, ...hist.map(h => h.weight));
}

function getLastSession(exName) {
  const hist = exercises[exName]?.history || [];
  if (!hist.length) return null;
  const dates = [...new Set(hist.map(h => h.date))].sort();
  const lastDate = dates[dates.length-1];
  return hist.filter(h => h.date === lastDate);
}

function getProgression(exName) {
  const hist = exercises[exName]?.history || [];
  const dates = [...new Set(hist.map(h => h.date))].sort();
  return dates.map(d => {
    const sets = hist.filter(h => h.date === d);
    const maxW = Math.max(...sets.map(s => s.weight));
    return {date: d, maxWeight: maxW, sets};
  });
}

// Dashboard
function initDashboard() {
  const totalSessions = sessions.length;
  const totalExercises = Object.keys(exercises).length;
  const allEntries = sessions.flatMap(s => s.main);
  const heaviestEx = Object.entries(exercises).reduce((best, [name, data]) => {
    const maxW = Math.max(0, ...data.history.map(h => h.weight));
    return maxW > best.weight ? {name, weight: maxW} : best;
  }, {name:'', weight:0});
  
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-number">${totalSessions}</div><div class="stat-label">Total Sessions</div></div>
    <div class="stat-card"><div class="stat-number">${totalExercises}</div><div class="stat-label">Unique Exercises</div></div>
    <div class="stat-card"><div class="stat-number">${heaviestEx.weight}kg</div><div class="stat-label">Heaviest: ${heaviestEx.name}</div></div>
    <div class="stat-card"><div class="stat-number">${allEntries.length}</div><div class="stat-label">Total Sets Logged</div></div>
  `;
  
  // Populate chart dropdown with exercises that have >2 sessions
  const sel = document.getElementById('dashChartExercise');
  const freqExs = Object.entries(exercises)
    .map(([name, data]) => ({name, sessions: new Set(data.history.map(h=>h.date)).size, maxW: Math.max(0,...data.history.map(h=>h.weight))}))
    .filter(e => e.sessions >= 2 && e.maxW > 0)
    .sort((a,b) => b.sessions - a.sessions);
  
  freqExs.forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.name;
    opt.textContent = e.name + ' (' + e.sessions + ' sessions)';
    sel.appendChild(opt);
  });
  
  updateDashChart();
  initCatChart();
}

let dashChartInstance = null;
function updateDashChart() {
  const exName = document.getElementById('dashChartExercise').value;
  if (!exName) return;
  
  const prog = getProgression(exName);
  const labels = prog.map(p => p.date);
  const weights = prog.map(p => p.maxWeight);
  
  if (dashChartInstance) dashChartInstance.destroy();
  dashChartInstance = new Chart(document.getElementById('dashChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Max Weight (kg)',
        data: weights,
        borderColor: '#e94560',
        backgroundColor: '#e9456033',
        fill: true,
        tension: 0.3,
        pointRadius: 6,
        pointBackgroundColor: '#e94560'
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#e0e0e0' } } },
      scales: {
        x: { ticks: { color: '#8899aa' }, grid: { color: '#0f346033' } },
        y: { ticks: { color: '#8899aa' }, grid: { color: '#0f346033' }, title: { display: true, text: 'kg', color: '#8899aa' } }
      }
    }
  });
}

function initCatChart() {
  const catCounts = {};
  Object.values(exercises).forEach(e => {
    const cat = e.category || 'Other';
    catCounts[cat] = (catCounts[cat] || 0) + e.history.length;
  });
  
  new Chart(document.getElementById('catChart'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(catCounts),
      datasets: [{
        data: Object.values(catCounts),
        backgroundColor: Object.keys(catCounts).map(c => catColors[c]?.fg || '#aaa')
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'right', labels: { color: '#e0e0e0', padding: 12 } } }
    }
  });
}

// Exercises tab
function filterExercises() {
  const cat = document.getElementById('catFilter').value;
  const search = document.getElementById('searchEx').value.toLowerCase();
  
  const list = document.getElementById('exerciseList');
  list.innerHTML = '';
  
  Object.entries(exercises)
    .filter(([name, data]) => {
      if (cat !== 'all' && data.category !== cat) return false;
      if (search && !name.toLowerCase().includes(search)) return false;
      return true;
    })
    .sort((a,b) => {
      const aSessions = new Set(a[1].history.map(h=>h.date)).size;
      const bSessions = new Set(b[1].history.map(h=>h.date)).size;
      return bSessions - aSessions;
    })
    .forEach(([name, data]) => {
      const maxW = Math.max(0, ...data.history.map(h => h.weight));
      const sessionCount = new Set(data.history.map(h => h.date)).size;
      const last = getLastSession(name);
      const lastWeight = last ? Math.max(...last.map(s=>s.weight)) : 0;
      
      const card = document.createElement('div');
      card.className = 'exercise-card';
      card.onclick = () => showExerciseDetail(name);
      card.innerHTML = `
        <h4>${name}</h4>
        <div class="meta">${getCatBadge(data.category, name)} &middot; ${sessionCount} sessions</div>
        <div class="weight-info">Last: ${lastWeight}kg &middot; Max: ${maxW}kg</div>
      `;
      list.appendChild(card);
    });
}

// Sessions tab
function initSessions() {
  const sel = document.getElementById('sessionFilter');
  // Add sessions in reverse chronological order (latest first)
  const sortedSessions = [...sessions].sort((a, b) => b.date.localeCompare(a.date));
  sortedSessions.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.date;
    opt.textContent = s.display_date;
    sel.appendChild(opt);
  });
  // Default to the latest session
  sel.value = sortedSessions[0].date;
  filterSessions();
}

function filterSessions() {
  const val = document.getElementById('sessionFilter').value;
  const list = document.getElementById('sessionsList');
  list.innerHTML = '';
  
  const filtered = val === 'all' ? sessions : sessions.filter(s => s.date === val);
  
  filtered.forEach(s => {
    let html = '<div class="card"><h3>'+s.display_date+'</h3>';
    
    if (s.warmup.length) {
      html += '<p style="color:#8899aa;margin:8px 0 4px">Warm-up: '+s.warmup.map(e=>e.exercise).join(', ')+'</p>';
    }
    
    if (s.main.length) {
      html += '<table><thead><tr><th>Exercise</th><th>Cat</th><th>Set</th><th>Reps</th><th>Weight</th><th>Comment</th></tr></thead><tbody>';
      s.main.forEach(e => {
        html += '<tr><td>'+e.exercise+'</td><td>'+getCatBadge(e.category||'Other', e.exercise)+'</td><td>'+e.set+'</td><td>'+e.reps+'</td><td>'+(e.weight>0?e.weight+'kg':'-')+'</td><td>'+(e.comment||'')+'</td></tr>';
      });
      html += '</tbody></table>';
    }
    
    if (s.finisher.length) {
      html += '<p style="color:#8899aa;margin:12px 0 4px">Finisher:</p><table><thead><tr><th>Exercise</th><th>Reps</th><th>Weight</th></tr></thead><tbody>';
      s.finisher.forEach(e => {
        html += '<tr><td>'+e.exercise+'</td><td>'+e.reps+'</td><td>'+(e.weight>0?e.weight+'kg':'-')+'</td></tr>';
      });
      html += '</tbody></table>';
    }
    
    html += '</div>';
    list.innerHTML += html;
  });
}

  const sel = document.getElementById('gymExercise');

    .sort((a,b) => a[0].localeCompare(b[0]))
    .forEach(([name, data]) => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    });
  updateGymMode();

function updateGymMode() {
  const name = document.getElementById('gymExercise').value;
  if (!name) return;
  
  const data = exercises[name];
  const prog = getProgression(name);
  const last = prog[prog.length - 1];
  const prev = prog.length > 1 ? prog[prog.length - 2] : null;
  
  const lastMaxW = last ? last.maxWeight : 0;
  const prevMaxW = prev ? prev.maxWeight : 0;
  const change = lastMaxW - prevMaxW;
  
  let suggestion = '';
  if (lastMaxW > 0) {
    const sameW = lastMaxW;
    const upW = Math.round((lastMaxW * 1.05) * 2) / 2; // round to 0.5
    suggestion = `
      <div class="suggestion">
        <strong>Suggestion for today:</strong><br>
        Same weight: <strong>${sameW}kg</strong> &middot; 
        Progress (+5%): <strong>${upW}kg</strong>
      </div>
    `;
  }
  
  let setsHtml = '';
  if (last) {
    setsHtml = '<div style="margin-top:20px">';
    setsHtml += '<p style="color:#8899aa;margin-bottom:10px;font-size:14px">Last session ('+last.date+'):</p>';
    last.sets.forEach(s => {
      setsHtml += '<div class="gym-set-row" style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #0f346033">';
      setsHtml += '<span style="color:#8899aa;font-size:14px;min-width:50px">Set '+s.set+'</span>';
      setsHtml += '<span style="font-size:18px;font-weight:600;min-width:70px;text-align:center"><strong>'+s.reps+'</strong> <span style="color:#8899aa;font-size:13px">reps</span></span>';
      setsHtml += '<span style="font-size:18px;font-weight:600;min-width:80px;text-align:right;color:#e94560"><strong>'+s.weight+'</strong> <span style="font-size:13px">kg</span></span>';
      setsHtml += '</div>';
      if (s.comment) setsHtml += '<div style="color:#8899aa;font-style:italic;font-size:13px;padding:4px 0 8px 50px">'+s.comment+'</div>';
    });
    setsHtml += '</div>';
  }
  
  let historyHtml = '<div style="margin-top:20px"><h3 style="color:#e94560;margin-bottom:12px">History</h3>';
  prog.slice().reverse().forEach(p => {
    historyHtml += '<div style="padding:8px 0;border-bottom:1px solid #0f346033"><strong style="color:#8899aa">'+p.date+'</strong> - Max: <strong>'+p.maxWeight+'kg</strong>';
    historyHtml += ' ('+p.sets.map(s=>s.reps+'x'+s.weight+'kg').join(', ')+')</div>';
  });
  historyHtml += '</div>';
  
  document.getElementById('gymContent').innerHTML = `
    <div class="gym-card">
      <h2>${name}</h2>
      <div>${getCatBadge(data.category, name)}</div>
      <div class="last-weight" style="margin-top:16px">${lastMaxW}kg</div>
      <div class="last-detail">
        Last max weight${change !== 0 ? ' <span class="progress-arrow '+(change>0?'progress-up':'progress-down')+'">'+(change>0?'\u25B2':'\u25BC')+' '+Math.abs(change)+'kg</span>' : ''}
      </div>
      ${suggestion}
      ${setsHtml}
    </div>
    ${historyHtml}
  `;
}

// Tab switching
function showTab(tab) {
  document.querySelectorAll('.content').forEach(el => el.classList.add('hidden'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById(tab).classList.remove('hidden');
  event.target.classList.add('active');
}

// Init
initDashboard();
filterExercises();
initSessions();
initGymMode();

// ========== PWA Service Worker (inline) ==========
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'workout-tracker-v1';
    const URLS_TO_CACHE = [
      './',
      'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js'
    ];

    self.addEventListener('install', event => {
      event.waitUntil(
        caches.open(CACHE_NAME).then(cache => cache.addAll(URLS_TO_CACHE))
      );
      self.skipWaiting();
    });

    self.addEventListener('activate', event => {
      event.waitUntil(
        caches.keys().then(keys => Promise.all(
          keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k))
        ))
      );
      self.clients.claim();
    });

    self.addEventListener('fetch', event => {
      event.respondWith(
        caches.match(event.request).then(cached => cached || fetch(event.request).then(resp => {
          const clone = resp.clone();
          caches.open(CACHE_NAME).then(cache => cache.put(event.request, clone));
          return resp;
        }))
      );
    });
  `;
  const swBlob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).then(reg => {
    console.log('SW registered');
  }).catch(err => {
    console.log('SW registration failed (expected for file:// URLs, works when served via HTTP)');
  });
}

// ========== PWA Install Prompt ==========
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('installBanner');
  if (banner) banner.classList.add('show');
});

function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(result => {
    deferredPrompt = null;
    document.getElementById('installBanner').classList.remove('show');
  });
}
</script>
